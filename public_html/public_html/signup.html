<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - MCS Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8 md:p-12">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black text-orange-500 tracking-tighter italic">MCS MASTER</h1>
            <p class="text-sm text-slate-500 mt-1">Buat Akun Agen Baru</p>
        </div>
        <form id="signup-form" class="space-y-5">
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Nama Lengkap</label>
                <input type="text" name="nama_user" required class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-teal-500">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Pilih Perusahaan Anda</label>
                <select name="developer_id" id="developer-select" required class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-teal-500">
                    <option value="">Memuat perusahaan...</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Username</label>
                <input type="text" name="username" required class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-teal-500">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Password</label>
                <input type="password" name="password" required class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-teal-500">
            </div>
            <div class="pt-4">
                <button type="submit" id="btn-signup" class="w-full py-4 bg-teal-600 text-white rounded-xl font-black text-sm uppercase tracking-widest shadow-lg hover:bg-teal-700 transition-all active:scale-95">
                    Daftar
                </button>
            </div>
        </form>
        <div class="text-center mt-6">
            <a href="login.html" class="text-xs text-slate-500 hover:text-teal-600 font-bold">Sudah punya akun? Login di sini</a>
        </div>
    </div>
    <script type="module" src="assets/js/signup.js"></script>
</body>
</html>
