<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - MCS Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8 md:p-12">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black text-orange-500 tracking-tighter italic">MCS MASTER</h1>
            <p class="text-sm text-slate-500 mt-1">Bergabung dengan Tim Penjualan Terbaik</p>
        </div>
        <form id="signup-form" class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Nama Lengkap (Anda)</label>
                <input type="text" name="nama_user" required class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-teal-500">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Posisi / Role</label>
                <select name="role" id="role-select" required class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-teal-500">
                    <option value="Agent Freelance">Saya ingin bergabung (Agent)</option>
                    <option value="Admin CS">Saya ingin bergabung (Admin CS)</option>
                    <option value="Developer">Saya ingin mendaftarkan perusahaan saya</option>
                </select>
            </div>
            <div id="existing-developer-container">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Perusahaan (Developer)</label>
                <select id="developer-select" name="developer_id" required class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-teal-500">
                    <option value="">Memuat data...</option>
                </select>
            </div>
            <div id="new-developer-container" class="hidden space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Nama Perusahaan Baru</label>
                    <input type="text" name="nama_perusahaan" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-teal-500">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Alamat Perusahaan</label>
                    <textarea name="alamat_perusahaan" rows="2" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-teal-500"></textarea>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Kontak Perusahaan</label>
                    <input type="tel" name="kontak_perusahaan" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-teal-500">
                </div>
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Username</label>
                <input type="text" name="username" required class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-teal-500">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Password</label>
                <div class="relative">
                    <input type="password" name="password" required class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-teal-500 pr-10">
                    <button type="button" class="toggle-password-btn absolute inset-y-0 right-0 px-3 flex items-center text-gray-400 hover:text-teal-600 focus:outline-none mt-1"><i data-lucide="eye" class="w-5 h-5 icon-eye"></i><i data-lucide="eye-off" class="w-5 h-5 icon-eye-slash hidden"></i></button>
                </div>
            </div>
            <div class="pt-4">
                <button type="submit" id="btn-signup" class="w-full py-4 bg-teal-600 text-white rounded-xl font-black text-sm uppercase tracking-widest shadow-lg hover:bg-teal-700 transition-all active:scale-95">
                    Daftar Sekarang
                </button>
            </div>
        </form>
        <div class="text-center mt-6">
            <a href="login.html" class="text-xs text-slate-500 hover:text-teal-600 font-bold">Sudah punya akun? Login di sini</a>
        </div>
    </div>
    <script>
        lucide.createIcons();
    </script>
    <script src="assets/js/toggle_password.js"></script>
    <script type="module" src="assets/js/signup.js"></script>
</body>
</html>
